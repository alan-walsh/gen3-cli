name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: gen3-linux-x86_64
            binary_path: target/x86_64-unknown-linux-musl/release/gen3
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: gen3-macos-x86_64
            binary_path: target/x86_64-apple-darwin/release/gen3
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gen3-macos-aarch64
            binary_path: target/aarch64-apple-darwin/release/gen3
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gen3-windows-x86_64.exe
            binary_path: target/x86_64-pc-windows-msvc/release/gen3.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    # Run if at least one build job succeeded, even if others failed or were cancelled.
    if: ${{ always() && contains(needs.build.result, 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Glob picks up only artifacts that were actually produced.
          files: artifacts/**/*
          generate_release_notes: true