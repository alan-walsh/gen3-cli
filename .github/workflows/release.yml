name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_name: gen3_Linux_amd64
            archive_ext: tar.gz
            binary_path: target/x86_64-unknown-linux-musl/release/gen3
            binary_name: gen3
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: gen3_Darwin_arm64
            archive_ext: tar.gz
            binary_path: target/aarch64-apple-darwin/release/gen3
            binary_name: gen3
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: gen3_Windows_amd64
            archive_ext: zip
            binary_path: target/x86_64-pc-windows-msvc/release/gen3.exe
            binary_name: gen3.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cp ${{ matrix.binary_path }} ${{ matrix.binary_name }}
          tar -czf ${{ matrix.archive_name }}.tar.gz ${{ matrix.binary_name }} README.md skills/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item ${{ matrix.binary_path }} ${{ matrix.binary_name }}
          Compress-Archive -Path ${{ matrix.binary_name }},README.md,skills -DestinationPath ${{ matrix.archive_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    # Run unless every build job failed (allow partial success / cancellation).
    if: ${{ always() && needs.build.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true